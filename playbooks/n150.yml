---
# N150 Full Stack Deployment
# Deploys complete n150 stack in dependency order.
#
# Prerequisites: n150_init.yml must have completed and the intermediate CA
# certificate must be in place before running this playbook.
#
# Usage:
#   ansible-playbook -i inventory/lab playbooks/n150.yml
#   ansible-playbook -i inventory/prod playbooks/n150.yml

- import_playbook: apt_repositories.yml
- import_playbook: update.yml
- import_playbook: security.yml
- import_playbook: certs.yml
- import_playbook: postgresql.yml
- import_playbook: pki.yml
- import_playbook: n8n.yml
- import_playbook: caddy.yml
- import_playbook: victoriametrics.yml
- import_playbook: victorialogs.yml
- import_playbook: grafana.yml
- import_playbook: otelcol.yml
- import_playbook: restic.yml
