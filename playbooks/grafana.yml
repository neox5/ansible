---
# Grafana Deployment
#
# Usage:
#   ansible-playbook -i inventory/lab playbooks/grafana.yml
#
# Removal (preserve data):
#   ansible-playbook -i inventory/lab playbooks/grafana.yml -e "grafana_state=absent"
#
# Removal (destroy data):
#   ansible-playbook -i inventory/lab playbooks/grafana.yml -e "grafana_state=absent grafana_remove_data=true"

- name: Deploy Grafana
  hosts: all
  become: true
  roles:
    - grafana
