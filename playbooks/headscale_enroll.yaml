---
# Headscale Node Enrollment
# Creates a headscale user (idempotent) and generates a preauthkey for node enrollment.
#
# Required vars:
#   headscale_user           — headscale user/namespace (e.g. zion)
#
# Optional vars:
#   headscale_node           — label for operator output only (e.g. n150-01)
#   headscale_key_expiration — preauthkey expiration duration (default: 1h)
#   headscale_key_reusable   — whether the key can be used more than once (default: false)
#
# Usage:
#   ansible-playbook -i inventory/prod playbooks/headscale_enroll.yaml \
#     -l heimdall \
#     -e headscale_user=zion \
#     -e headscale_node=n150-01

- name: Headscale Node Enrollment
  hosts: all
  become: true

  vars:
    headscale_key_expiration: "1h"
    headscale_key_reusable: false

  tasks:
    - name: Assert headscale_user is provided
      ansible.builtin.assert:
        quiet: true
        that: headscale_user | default('') | length > 0
        fail_msg: "headscale_user is required — e.g. -e headscale_user=zion"

    - name: List headscale users
      ansible.builtin.command:
        cmd: headscale users list -o json
      register: _headscale_users_raw
      changed_when: false

    - name: Set users list fact
      ansible.builtin.set_fact:
        _headscale_users: "{{ _headscale_users_raw.stdout | from_json | default([]) }}"

    - name: Create headscale user if absent
      ansible.builtin.command:
        cmd: headscale users create {{ headscale_user }}
      when: _headscale_users == None or
            (_headscale_users | selectattr('name', 'equalto', headscale_user) | list | length == 0)
      changed_when: true

    - name: List headscale users after potential creation
      ansible.builtin.command:
        cmd: headscale users list -o json
      register: _headscale_users_raw
      changed_when: false

    - name: Set user ID fact
      ansible.builtin.set_fact:
        _headscale_user_id: "{{ (_headscale_users_raw.stdout | from_json | selectattr('name', 'equalto', headscale_user) | list | first).id }}"

    - name: Generate preauthkey
      ansible.builtin.command:
        cmd: >
          headscale preauthkeys create
          --user {{ _headscale_user_id }}
          --expiration {{ headscale_key_expiration }}
          {{ '--reusable' if headscale_key_reusable else '' }}
          -o json
      register: _headscale_preauthkey
      changed_when: true
      no_log: true

    - name: Display enrollment output
      ansible.builtin.debug:
        msg:
          - "══════════════════════════════════════════════════════════════════════════════════════"
          - "  Headscale Enrollment Key"
          - "══════════════════════════════════════════════════════════════════════════════════════"
          - "  User:       {{ headscale_user }} (id={{ _headscale_user_id }})"
          - "  Node:       {{ headscale_node | default('(not specified)') }}"
          - "  Expiration: {{ headscale_key_expiration }}"
          - "  Reusable:   {{ headscale_key_reusable }}"
          - "  Key:        {{ (_headscale_preauthkey.stdout | from_json).key }}"
          - "══════════════════════════════════════════════════════════════════════════════════════"
          - "  tailscale up --login-server https://{{ headscale_domain }} --authkey {{ (_headscale_preauthkey.stdout | from_json).key }}"
          - "══════════════════════════════════════════════════════════════════════════════════════"
