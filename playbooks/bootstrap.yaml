---
- name: Bootstrap server for Ansible management
  hosts: all
  gather_facts: no
  become: yes

  tasks:
    - name: Check Python is installed
      raw: command -v python3
      register: python_check
      changed_when: false
      failed_when: false

    - name: Install Python if missing
      raw: |
        if command -v apt-get >/dev/null 2>&1; then
          apt-get update && apt-get install -y python3
        else
          echo "Unsupported package manager" >&2
          exit 1
        fi
      when: python_check.rc != 0
      changed_when: true

    - name: Gather facts after Python installed
      setup:

    - name: Assert root password hash is configured
      ansible.builtin.assert:
        quiet: true
        that: bootstrap_root_password_hash | length > 0
        fail_msg: "bootstrap_root_password_hash_secret must be set in host_vars secrets (SOPS encrypted)"
      no_log: true

    - name: Set system hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"

    - name: Ensure hostname resolves on loopback in /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: "^127\\.0\\.1\\.1\\s"
        line: "127.0.1.1\t{{ inventory_hostname }}"
        state: present

    - name: Configure Debian network repositories
      block:
        - name: Remove CD-ROM source from sources.list
          ansible.builtin.lineinfile:
            path: /etc/apt/sources.list
            regexp: "^deb cdrom:"
            state: absent

        - name: Configure Debian network sources
          ansible.builtin.copy:
            content: |
              deb http://deb.debian.org/debian {{ ansible_distribution_release }} main non-free-firmware
              deb http://deb.debian.org/debian {{ ansible_distribution_release }}-updates main non-free-firmware
              deb http://security.debian.org/debian-security {{ ansible_distribution_release }}-security main non-free-firmware
            dest: /etc/apt/sources.list
            owner: root
            group: root
            mode: "0644"
      when: ansible_distribution == "Debian"

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
      when: ansible_distribution == "Debian"

    - name: Create ansible system user
      ansible.builtin.user:
        name: "{{ bootstrap_ansible_user }}"
        shell: /bin/bash
        system: true
        create_home: true
        home: "/home/{{ bootstrap_ansible_user }}"

    - name: Create admin user
      ansible.builtin.user:
        name: "{{ bootstrap_admin_user }}"
        shell: /bin/bash
        create_home: true
        home: "/home/{{ bootstrap_admin_user }}"
        groups: sudo
        append: true

    - name: Set root password
      ansible.builtin.user:
        name: root
        password: "{{ bootstrap_root_password_hash }}"
      no_log: true

    - name: Create .ssh directory for ansible user
      ansible.builtin.file:
        path: "/home/{{ bootstrap_ansible_user }}/.ssh"
        state: directory
        owner: "{{ bootstrap_ansible_user }}"
        group: "{{ bootstrap_ansible_user }}"
        mode: "0700"

    - name: Create .ssh directory for admin user
      ansible.builtin.file:
        path: "/home/{{ bootstrap_admin_user }}/.ssh"
        state: directory
        owner: "{{ bootstrap_admin_user }}"
        group: "{{ bootstrap_admin_user }}"
        mode: "0700"

    - name: Add automation SSH keys to ansible user
      authorized_key:
        user: "{{ bootstrap_ansible_user }}"
        key: "{{ item }}"
        state: present
      loop: "{{ bootstrap_ansible_keys }}"

    - name: Add admin SSH keys to admin user
      authorized_key:
        user: "{{ bootstrap_admin_user }}"
        key: "{{ item }}"
        state: present
      loop: "{{ bootstrap_admin_keys + bootstrap_admin_emergency_keys }}"

    - name: Configure temporary passwordless sudo for ansible user
      ansible.builtin.copy:
        content: "{{ bootstrap_ansible_user }} ALL=(ALL) NOPASSWD:ALL\n"
        dest: "/etc/sudoers.d/00-ansible-bootstrap"
        mode: "0440"
        validate: "visudo -cf %s"

    - name: Configure temporary passwordless sudo for admin user
      ansible.builtin.copy:
        content: "{{ bootstrap_admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
        dest: "/etc/sudoers.d/00-admin-bootstrap"
        mode: "0440"
        validate: "visudo -cf %s"

    - name: Verify ansible user can sudo
      ansible.builtin.command: sudo -n -l
      become: yes
      become_user: "{{ bootstrap_ansible_user }}"
      changed_when: false

    - name: Verify admin user can sudo
      ansible.builtin.command: sudo -n -l
      become: yes
      become_user: "{{ bootstrap_admin_user }}"
      changed_when: false

    - name: Remove temporary user
      ansible.builtin.user:
        name: "{{ bootstrap_temp_user }}"
        state: absent
        remove: yes
        force: yes
      when: bootstrap_temp_user is defined and bootstrap_temp_user != ""

    - name: Build next steps message
      ansible.builtin.set_fact:
        _bootstrap_next_steps: "{{ ['Bootstrap complete!', ''] +
          ['Root account: Password set from vault (console access only)', ''] +
          ['Automation access:'] +
          (bootstrap_ansible_keys | map('basename') | map('replace', '.pub', '') | map('regex_replace', '^', '  ssh -i ~/.ssh/') | map('regex_replace', '$', ' ' ~ bootstrap_ansible_user ~ '@' ~ ansible_host) | list) +
          [''] +
          ['Operator access (admin):'] +
          (bootstrap_admin_keys | map('basename') | map('replace', '.pub', '') | map('regex_replace', '^', '  ssh -i ~/.ssh/') | map('regex_replace', '$', ' ' ~ bootstrap_admin_user ~ '@' ~ ansible_host) | list) +
          [''] +
          ['Emergency access:'] +
          (bootstrap_admin_emergency_keys | map('basename') | map('replace', '.pub', '') | map('regex_replace', '^', '  ssh -i ~/.ssh/') | map('regex_replace', '$', ' ' ~ bootstrap_admin_user ~ '@' ~ ansible_host) | list) +
          [''] +
          (['Temporary user removed: ' ~ bootstrap_temp_user] if (bootstrap_temp_user is defined and bootstrap_temp_user != '') else ['No temporary user to remove']) +
          ['Root SSH: still open — run security_hardening next'] }}"

    - name: Display next steps
      ansible.builtin.debug:
        msg: "{{ _bootstrap_next_steps }}"
