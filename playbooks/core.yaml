---
# Core Zero Trust Overlay - Minimal Deployment
# Deploys the Layer 1 (Zero Trust Overlay) minimal role set on core:
# apt_repositories -> update -> security -> journald -> ziti_controller -> ziti_router
# Excludes stepca, postgresql, and the rest of the legacy full stack (deferred).
#
# Scoped to the 'core' group — safe to run without -l.
#
# Usage:
#   ansible-playbook -i inventory/prod playbooks/core.yaml

- name: Deploy core
  hosts: core
  become: true
  tasks:
    - name: Configure APT repositories
      ansible.builtin.import_role:
        name: apt_repositories

    - name: Manual system updates
      ansible.builtin.import_tasks: ../tasks/update.yaml

    - name: Apply security hardening
      ansible.builtin.import_role:
        name: security_hardening

    - name: Configure journald
      ansible.builtin.import_role:
        name: journald

    - name: Deploy OpenZiti Controller
      ansible.builtin.import_role:
        name: ziti_controller

    - name: Deploy OpenZiti Router
      ansible.builtin.import_role:
        name: ziti_router
