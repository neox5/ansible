---
# N150 PKI Initialization
# Run once before n150.yml to set up the PKI foundation.
#
# After this playbook completes:
#   1. Fetch the CSR from /tmp/stepca-issuing.csr on the control node
#   2. Sign it with the root CA (intermediate CA profile)
#   3. Place the signed certificate at stepca_certs_dir/intermediate_ca.crt on the target
#   4. Run n150.yml to deploy the full stack
#
# Usage:
#   ansible-playbook -i inventory/lab playbooks/n150_init.yml

- import_playbook: apt_repositories.yml
- import_playbook: update.yml
- import_playbook: security.yml
- import_playbook: certs.yml
- import_playbook: pki.yml
