---
# OpenZiti Component Registration
# Registers overlay components with the controller and outputs enrollment tokens.
#
# Requirements:
#   - ziti CLI available on the targeted host (eroc — the only host with it installed)
#   - Must be run with -l eroc regardless of which identity is being registered
#   - Controller reachable at ziti_ctrl_advertised_address:ziti_ctrl_advertised_port
#   - ziti_admin_password available (from SOPS-encrypted inventory)
#   - ziti_name mandatory for all tags (-e ziti_name=<name>)
#   - Exactly one of --tags router|router-tunneler|tunneler|client is required
#
# Idempotency:
#   - Any stale /tmp/{{ ziti_name }}.jwt on the registration host from a prior
#     interrupted run is removed unconditionally before create/re-enroll, so
#     this playbook can always be safely re-run.
#   - router / router-tunneler: if an edge-router with this name already exists
#     (e.g. a prior run's JWT expired before enrollment completed), a fresh JWT
#     is re-issued via `ziti edge re-enroll edge-router` instead of failing on
#     "name must be unique".
#   - tunneler / client: no equivalent re-enroll exists for identities in the
#     OpenZiti CLI (open upstream request: openziti/ziti#2378). A name collision
#     on these tags still fails — recover manually:
#       ziti edge delete identity <name>
#     then re-run this playbook.
#
# Debugging:
#   Login failures (no_log, since the command line carries the admin password)
#   surface a credential-free stderr summary by default.
#   For the rare case that's not enough, re-run with -e ziti_debug=true to also
#   dump the full raw result (includes the command line, i.e. the credential —
#   local/debug use only).
#
# Usage:
#   ansible-playbook -i inventory/<env> -l <controller_host> playbooks/ziti_register.yaml --tags <router|router-tunneler|tunneler|client> -e "ziti_name=<name>"
#
# Output: /tmp/{{ ziti_name }}.jwt on the control node (fetched from eroc, then
# removed from eroc — see fetch/cleanup tasks below)

- name: Register OpenZiti components
  hosts: all
  gather_facts: false
  become: false
  tasks:
    # -----------------------------------------------------------------------
    # Preflight — consolidated usage validation
    # Runs unconditionally (tags: always) so a missing/invalid --tags value
    # is itself caught here rather than silently matching zero tasks below.
    # -----------------------------------------------------------------------

    - name: Determine effective run tags
      ansible.builtin.set_fact:
        _ziti_valid_tags: [router, router-tunneler, tunneler, client]
        _ziti_selected_tags: "{{ ansible_run_tags | difference(['always', 'all']) }}"
      tags: always

    - name: Collect usage violations
      ansible.builtin.set_fact:
        _ziti_usage_errors: >-
          {{
            (['ziti_name is required (-e ziti_name=<name>).']
              if not (ziti_name | default('') | length > 0) else []) +
            (['Exactly one of --tags router|router-tunneler|tunneler|client is required (got: '
              ~ (_ziti_selected_tags | join(', ') if _ziti_selected_tags | length > 0 else 'none') ~ ').']
              if (_ziti_selected_tags | length != 1 or _ziti_selected_tags[0] not in _ziti_valid_tags) else [])
          }}
      tags: always

    - name: Show usage and fail on invalid input
      ansible.builtin.fail:
        msg: |
          {{ _ziti_usage_errors | join('\n') }}

          Usage:
            ansible-playbook -i inventory/<env> -l <controller_host> playbooks/ziti_register.yaml --tags <router|router-tunneler|tunneler|client> -e "ziti_name=<name>"
      when: _ziti_usage_errors | length > 0
      tags: always

    # -----------------------------------------------------------------------
    # Controller login
    # -----------------------------------------------------------------------

    - name: Login to controller
      ansible.builtin.command:
        cmd: >
          ziti edge login
          https://{{ ziti_ctrl_advertised_address }}:{{ ziti_ctrl_advertised_port }}
          -u admin
          -p {{ ziti_admin_password }}
          -y
      register: _ziti_login
      no_log: true
      changed_when: true
      failed_when: false
      tags: [router, router-tunneler, tunneler, client]

    - name: Fail with concise login error
      ansible.builtin.fail:
        msg: >-
          Login to controller failed: {{ _ziti_login.stderr | ziti_error_summary }}
          {{ '' if (ziti_debug | default(false) | bool) else '(re-run with -e ziti_debug=true for full raw output, including the command line)' }}
      when: _ziti_login.rc != 0
      tags: [router, router-tunneler, tunneler, client]

    - name: Debug - full login result (sensitive — includes credential in argv)
      ansible.builtin.debug:
        var: _ziti_login
      when:
        - _ziti_login.rc != 0
        - ziti_debug | default(false) | bool
      tags: [router, router-tunneler, tunneler, client]

    # -----------------------------------------------------------------------
    # Registration
    # -----------------------------------------------------------------------

    - name: Remove stale JWT file before registration
      ansible.builtin.file:
        path: "/tmp/{{ ziti_name }}.jwt"
        state: absent
      become: true
      tags: [router, router-tunneler, tunneler, client]

    - name: Check if edge-router already exists
      ansible.builtin.command:
        cmd: >
          ziti edge list edge-routers 'name="{{ ziti_name }}"' -j
      register: _ziti_edge_router_list
      changed_when: false
      tags: [router, router-tunneler]

    - name: Set edge-router existence fact
      ansible.builtin.set_fact:
        _ziti_edge_router_exists: "{{ (_ziti_edge_router_list.stdout | from_json).data | length > 0 }}"
      tags: [router, router-tunneler]

    - name: Create edge-router (no tunneler)
      ansible.builtin.command:
        cmd: >
          ziti edge create edge-router {{ ziti_name }}
          --jwt-output-file /tmp/{{ ziti_name }}.jwt
      register: _ziti_create_router
      failed_when: false
      when: not _ziti_edge_router_exists
      tags: [router]

    - name: Fail with concise edge-router creation error
      ansible.builtin.fail:
        msg: "Edge-router creation failed: {{ _ziti_create_router.stderr | ziti_error_summary }}"
      when:
        - not _ziti_edge_router_exists
        - _ziti_create_router.rc != 0
      tags: [router]

    - name: Create edge-router (tunneler enabled)
      ansible.builtin.command:
        cmd: >
          ziti edge create edge-router {{ ziti_name }}
          --tunneler-enabled
          --jwt-output-file /tmp/{{ ziti_name }}.jwt
      register: _ziti_create_router_tunneler
      failed_when: false
      when: not _ziti_edge_router_exists
      tags: [router-tunneler]

    - name: Fail with concise edge-router creation error
      ansible.builtin.fail:
        msg: "Edge-router creation failed: {{ _ziti_create_router_tunneler.stderr | ziti_error_summary }}"
      when:
        - not _ziti_edge_router_exists
        - _ziti_create_router_tunneler.rc != 0
      tags: [router-tunneler]

    - name: Re-enroll existing edge-router (fresh JWT)
      ansible.builtin.command:
        cmd: >
          ziti edge re-enroll edge-router {{ ziti_name }}
          --jwt-output-file /tmp/{{ ziti_name }}.jwt
      register: _ziti_reenroll_router
      failed_when: false
      when: _ziti_edge_router_exists
      tags: [router, router-tunneler]

    - name: Fail with concise re-enrollment error
      ansible.builtin.fail:
        msg: "Edge-router re-enrollment failed: {{ _ziti_reenroll_router.stderr | ziti_error_summary }}"
      when:
        - _ziti_edge_router_exists
        - _ziti_reenroll_router.rc != 0
      tags: [router, router-tunneler]

    - name: Create tunneler identity
      ansible.builtin.command:
        cmd: >
          ziti edge create identity {{ ziti_name }}
          --jwt-output-file /tmp/{{ ziti_name }}.jwt
      register: _ziti_create_identity
      failed_when: false
      tags: [tunneler, client]

    - name: Fail with concise identity creation error
      ansible.builtin.fail:
        msg: "Identity creation failed: {{ _ziti_create_identity.stderr | ziti_error_summary }}"
      when: _ziti_create_identity.rc != 0
      tags: [tunneler, client]

    # -----------------------------------------------------------------------
    # JWT handoff
    # -----------------------------------------------------------------------

    - name: Fetch JWT to control node
      ansible.builtin.fetch:
        src: "/tmp/{{ ziti_name }}.jwt"
        dest: "/tmp/{{ ziti_name }}.jwt"
        flat: true
      tags: [router, router-tunneler, tunneler, client]

    - name: Remove JWT from registration host
      ansible.builtin.file:
        path: "/tmp/{{ ziti_name }}.jwt"
        state: absent
      tags: [router, router-tunneler, tunneler, client]

    - name: Display JWT path
      ansible.builtin.debug:
        msg:
          - "JWT written to /tmp/{{ ziti_name }}.jwt on the control node."
          - "Proceed with: ansible-playbook -i inventory/prod playbooks/ziti_router.yaml -l {{ ziti_name }}"
      tags: [router, router-tunneler]

    - name: Display JWT path
      ansible.builtin.debug:
        msg:
          - "JWT written to /tmp/{{ ziti_name }}.jwt on the control node."
          - "Proceed with: ansible-playbook -i inventory/prod playbooks/ziti_tunneler.yaml -l {{ ziti_name }}"
      tags: [tunneler]

    - name: Display JWT path
      ansible.builtin.debug:
        msg:
          - "JWT written to /tmp/{{ ziti_name }}.jwt on the control node."
          - "Set ziti_tunneler_mode: client in host_vars for this host."
          - "Proceed with: ansible-playbook -i inventory/prod playbooks/ziti_tunneler.yaml -l {{ ziti_name }}"
      tags: [client]
