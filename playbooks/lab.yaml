---
# Lab Environment Setup
# Complete baseline + n8n stack for lab-vm
# Usage: ansible-playbook -i inventory/lab playbooks/lab.yaml

- name: Configure lab environment baseline
  hosts: lab
  become: yes

  roles:
    # Configure Debian repositories first
    - apt_repositories

  tasks:
    # Update system packages after repository configuration
    - name: Import update tasks
      ansible.builtin.import_tasks: ../tasks/update.yaml

  post_tasks:
    # Apply security hardening last
    - name: Import security hardening role
      ansible.builtin.import_role:
        name: security_hardening

- import_playbook: n8n/deploy_stack.yaml
