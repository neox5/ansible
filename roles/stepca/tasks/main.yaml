---
# stepca custom role - Main task orchestration
# Debian 13 Trixie only

- name: Include preflight checks
  ansible.builtin.import_tasks: preflight.yaml
  when: stepca_state == 'present'

- name: Include installation tasks
  ansible.builtin.import_tasks: install.yaml
  when: stepca_state == 'present'

- name: Include bootstrap tasks
  ansible.builtin.import_tasks: bootstrap.yaml
  when: stepca_state == 'present'

- name: Include configuration tasks
  ansible.builtin.import_tasks: configure.yaml
  when: stepca_state == 'present'

- name: Include service tasks
  ansible.builtin.import_tasks: service.yaml
  when: stepca_state == 'present'

- name: Include removal tasks
  ansible.builtin.import_tasks: remove.yaml
  when: stepca_state == 'absent'
