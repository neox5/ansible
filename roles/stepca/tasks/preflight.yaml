---
# Preflight checks - validate environment before proceeding

- name: Gather distribution and service manager facts
  ansible.builtin.setup:
    gather_subset:
      - distribution
      - service_mgr

- name: Assert Debian 13 or later
  ansible.builtin.assert:
    quiet: true
    that:
      - ansible_distribution == "Debian"
      - ansible_distribution_major_version | int >= 13
    fail_msg: "This role requires Debian 13 or later"

- name: Assert systemd is the init system
  ansible.builtin.assert:
    quiet: true
    that: ansible_facts['service_mgr'] == 'systemd'
    fail_msg: "This role requires systemd"

- name: Assert valid state value
  ansible.builtin.assert:
    quiet: true
    that: stepca_state in ['present', 'absent']
    fail_msg: "stepca_state must be 'present' or 'absent'"

- name: Assert database datasource is configured
  ansible.builtin.assert:
    quiet: true
    that: stepca_db_datasource | length > 0
    fail_msg: "stepca_db_datasource must be set in inventory"
  when: stepca_state == 'present'

- name: Assert key password is configured
  ansible.builtin.assert:
    quiet: true
    that: stepca_key_password_secret | length > 0
    fail_msg: "stepca_key_password_secret must be set in inventory (SOPS encrypted)"
  when: stepca_state == 'present'
  no_log: true

- name: Display role information
  ansible.builtin.debug:
    msg: "stepca role - state={{ stepca_state }} version={{ stepca_version }}"
