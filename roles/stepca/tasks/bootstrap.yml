---
# Bootstrap tasks - generate key, CSR, and config
# Skipped entirely if intermediate_ca.crt already present (sneakernet complete)

- name: Check if intermediate CA certificate exists
  ansible.builtin.stat:
    path: "{{ stepca_certs_dir }}/intermediate_ca.crt"
  register: _stepca_intermediate_cert
  changed_when: false
  check_mode: false

- name: Write intermediate key password file
  ansible.builtin.copy:
    content: "{{ stepca_key_password }}"
    dest: "{{ stepca_password_file }}"
    owner: root
    group: "{{ stepca_system_group }}"
    mode: "0640"
  no_log: true
  when: not _stepca_intermediate_cert.stat.exists

- name: Generate intermediate CA key and CSR
  ansible.builtin.command:
    cmd: >
      step certificate create
      --csr
      --kty="{{ stepca_key_type }}"
      --curve="{{ stepca_key_curve }}"
      --password-file="{{ stepca_password_file }}"
      "{{ stepca_name }}"
      "{{ stepca_base_dir }}/issuing_ca.csr"
      "{{ stepca_secrets_dir }}/intermediate_ca_key"
  environment:
    STEPPATH: "{{ stepca_base_dir }}"
  when: not _stepca_intermediate_cert.stat.exists

- name: Set ownership on intermediate key
  ansible.builtin.file:
    path: "{{ stepca_secrets_dir }}/intermediate_ca_key"
    owner: root
    group: "{{ stepca_system_group }}"
    mode: "0640"
  when: not _stepca_intermediate_cert.stat.exists

- name: Render ca.json from template
  ansible.builtin.template:
    src: ca.json.j2
    dest: "{{ stepca_config_file }}"
    owner: root
    group: "{{ stepca_system_group }}"
    mode: "0640"
  notify: reload systemd

- name: Fetch generated CSR to control node
  ansible.builtin.fetch:
    src: "{{ stepca_base_dir }}/issuing_ca.csr"
    dest: "{{ stepca_csr_fetch_path }}"
    flat: true
  when: not _stepca_intermediate_cert.stat.exists

- name: Awaiting signed certificate from root CA
  ansible.builtin.debug:
    msg:
      - "CSR generated and fetched to {{ stepca_csr_fetch_path }} on the control node."
      - ""
      - "Sign the CSR with your root CA using an intermediate CA profile"
      - "(CA:true, pathlen:0, keyCertSign, cRLSign)."
      - ""
      - "Then:"
      - "  1. Place the signed certificate at {{ stepca_certs_dir }}/intermediate_ca.crt"
      - "  2. Place the root CA certificate at {{ stepca_certs_dir }}/root_ca.crt"
      - "  3. Re-run the playbook to start the service"
  when: not _stepca_intermediate_cert.stat.exists

- name: End play - awaiting sneakernet
  ansible.builtin.meta: end_host
  when: not _stepca_intermediate_cert.stat.exists
