---
# Service tasks - install systemd unit and start if certificates are present

- name: Check if intermediate CA certificate exists
  ansible.builtin.stat:
    path: "{{ stepca_certs_dir }}/intermediate_ca.crt"
  register: _stepca_intermediate_cert
  changed_when: false
  check_mode: false

- name: Install stepca systemd service unit
  ansible.builtin.template:
    src: stepca.service.j2
    dest: /etc/systemd/system/stepca.service
    owner: root
    group: root
    mode: "0644"
  notify: reload systemd

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Enable stepca service
  ansible.builtin.systemd:
    name: stepca
    enabled: true

- name: Start stepca service
  ansible.builtin.systemd:
    name: stepca
    state: started
  when: _stepca_intermediate_cert.stat.exists
