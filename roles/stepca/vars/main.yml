---
# stepca Role - Immutable Variables

# Architecture mapping for binary download
stepca_arch_map:
  i386: "386"
  x86_64: "amd64"
  aarch64: "arm64"
  armv7l: "arm"

stepca_arch: "{{ stepca_arch_map[ansible_facts['architecture']] | default(ansible_facts['architecture']) }}"

# Binary download base URLs
stepca_download_base: "https://github.com/smallstep/certificates/releases/download"
step_cli_download_base: "https://github.com/smallstep/cli/releases/download"
