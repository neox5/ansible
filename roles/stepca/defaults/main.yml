---
# stepca Role - Configuration Defaults

# Lifecycle
stepca_state: "present"

# Version (pinned - override in inventory to upgrade)
stepca_version: "0.29.0"
step_cli_version: "0.29.0"

# System identity
stepca_system_user: "stepca"
stepca_system_group: "stepca"

# Paths
stepca_base_dir: "/etc/stepca"
stepca_certs_dir: "{{ stepca_base_dir }}/certs"
stepca_secrets_dir: "{{ stepca_base_dir }}/secrets"
stepca_config_dir: "{{ stepca_base_dir }}/config"
stepca_db_dir: "/var/lib/stepca/db"

# Config file path
stepca_config_file: "{{ stepca_config_dir }}/ca.json"

# Password file for intermediate key encryption
stepca_password_file: "{{ stepca_secrets_dir }}/password"

# Network
stepca_address: "127.0.0.1:9443"
stepca_dns_names: []

# CA identity
stepca_name: "Issuing CA"

# Certificate and key base name (drives all artifact filenames)
# Override in inventory to match CA identity e.g. zion_issuing_ca_g1
stepca_cert_name: "issuing_ca"

# ACME provisioner name (used in directory URL path segment)
# Results in: https://<address>/acme/<n>/directory
stepca_acme_provisioner_name: "stepca"

# ACME provisioner domain allow list
# When non-empty, restricts certificate issuance to listed domains only
# Example: ["*.zion.local"]
stepca_acme_allowed_domains: []

# Root CA certificate path (must exist on target before stepca starts)
# Typically deployed by the certs role via ca_certs
stepca_root_ca_path: ""

# Database (postgresql)
stepca_db_type: "postgresql"
stepca_db_datasource: ""

# Intermediate key password (SOPS encrypted in inventory)
stepca_key_password_secret: ""

# Directory on the control node where CSRs are fetched
stepca_csr_fetch_dir: "/tmp"

# Intermediate key type
stepca_key_type: "EC"
stepca_key_curve: "P-384"

# Systemd service tuning
stepca_systemd_restart_sec: 10
stepca_systemd_start_limit_burst: 5
stepca_systemd_start_limit_interval: 600
