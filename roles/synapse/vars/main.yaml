---
# Synapse Role - Immutable Variables

# APT repository
synapse_apt_keyring_path: /usr/share/keyrings/matrix-org-archive-keyring.gpg
synapse_apt_key_url: "https://packages.matrix.org/debian/matrix-org-archive-keyring.gpg"
synapse_apt_repo: "deb [signed-by={{ synapse_apt_keyring_path }}] https://packages.matrix.org/debian/ trixie main"

# Signing key path (generated by package postinst, never overwritten by role)
synapse_signing_key_path: "/etc/matrix-synapse/{{ synapse_server_name }}.signing.key"

# conf.d files owned by this role
synapse_confd_database: "/etc/matrix-synapse/conf.d/database.yaml"
synapse_confd_listeners: "/etc/matrix-synapse/conf.d/listeners.yaml"
synapse_confd_registration: "/etc/matrix-synapse/conf.d/registration.yaml"
synapse_confd_trusted_keys: "/etc/matrix-synapse/conf.d/trusted_keys.yaml"

# Health endpoint
synapse_health_url: "http://127.0.0.1:{{ synapse_listener_port }}/health"
