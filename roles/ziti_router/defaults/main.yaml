---
# ziti_router Role - Configuration Defaults

# Lifecycle
ziti_router_state: present
ziti_router_remove_data: false

# Router identity name — defaults to inventory hostname
ziti_name: "{{ inventory_hostname }}"

# JWT enrollment token path on control node (produced by ziti_register.yaml)
ziti_jwt_path: "/tmp/{{ ziti_name }}.jwt"

# Controller endpoint — reuse overlay-wide vars set in inventory
# ziti_ctrl_advertised_address: ""   # mandatory — set in inventory
# ziti_ctrl_advertised_port: 1280    # set in ziti_controller defaults

# Edge listener — router advertised address for SDK clients
ziti_router_advertised_address: ""
ziti_router_advertised_port: 3022

# Link listener — router-to-router mesh links (public routers only)
ziti_router_link_listener: false
ziti_router_link_advertised_address: ""
ziti_router_link_advertised_port: 3022

# Tunneler (built-in, host-mode only for now)
ziti_router_tunneler_enabled: false
ziti_router_tunneler_mode: host

# Filesystem paths
ziti_router_base_dir: "/var/lib/ziti-router"
ziti_router_config_file: "{{ ziti_router_base_dir }}/config.yml"
ziti_router_service_env: "/opt/openziti/etc/router/service.env"

# Service state
ziti_router_service_state: started
ziti_router_service_enabled: true
