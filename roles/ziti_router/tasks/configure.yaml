---
# Configuration tasks - render config.yml from template

- name: Ensure router base directory exists
  ansible.builtin.file:
    path: "{{ ziti_router_base_dir }}"
    state: directory
    owner: "{{ ziti_router_system_user }}"
    group: "{{ ziti_router_system_group }}"
    mode: "0700"

- name: Deploy router config.yml
  ansible.builtin.template:
    src: config.yml.j2
    dest: "{{ ziti_router_config_file }}"
    owner: "{{ ziti_router_system_user }}"
    group: "{{ ziti_router_system_group }}"
    mode: "0600"
  notify: restart ziti-router
