---
# Enrollment tasks - enroll router with controller (one-time)
# Gated on identity file existence - safe to re-run
# If JWT is not provisioned, remaining phases for THIS ROLE ONLY (configure/start/
# verify) are skipped via ziti_router_enrollment_pending - scoped to this role,
# does not affect other roles later in the same play.

- name: Check if router identity already enrolled
  ansible.builtin.stat:
    path: "{{ ziti_router_base_dir }}/{{ ziti_name }}.cert"
  register: _ziti_router_enrolled
  changed_when: false
  check_mode: false

- name: Check if JWT exists on control node when not yet enrolled
  ansible.builtin.stat:
    path: "{{ ziti_jwt_path }}"
  register: _ziti_jwt
  delegate_to: localhost
  become: false
  changed_when: false
  check_mode: false
  when: not _ziti_router_enrolled.stat.exists

- name: Set enrollment pending fact
  ansible.builtin.set_fact:
    ziti_router_enrollment_pending: true
  when:
    - not _ziti_router_enrolled.stat.exists
    - not _ziti_jwt.stat.exists

- name: Ensure router base directory exists
  ansible.builtin.file:
    path: "{{ ziti_router_base_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  when:
    - not _ziti_router_enrolled.stat.exists
    - _ziti_jwt.stat.exists | default(false)

- name: Copy JWT to router host
  ansible.builtin.copy:
    src: "{{ ziti_jwt_path }}"
    dest: "/tmp/{{ ziti_name }}.jwt"
    owner: root
    group: root
    mode: "0600"
  when:
    - not _ziti_router_enrolled.stat.exists
    - _ziti_jwt.stat.exists | default(false)

- name: Enroll router with controller
  ansible.builtin.command:
    cmd: >
      ziti router enroll {{ ziti_router_config_file }}
      --jwt /tmp/{{ ziti_name }}.jwt
  register: _ziti_router_enroll
  failed_when: false
  when:
    - not _ziti_router_enrolled.stat.exists
    - _ziti_jwt.stat.exists | default(false)

- name: Fail with concise enrollment error
  ansible.builtin.fail:
    msg: "Router enrollment failed: {{ _ziti_router_enroll.stderr | ziti_error_summary }}"
  when:
    - not _ziti_router_enrolled.stat.exists
    - _ziti_jwt.stat.exists | default(false)
    - _ziti_router_enroll.rc != 0

- name: Set ownership of enrolled identity files for router service
  ansible.builtin.file:
    path: "{{ item }}"
    owner: "{{ ziti_router_system_user }}"
    group: "{{ ziti_router_system_group }}"
  loop:
    - "{{ ziti_router_base_dir }}/{{ ziti_name }}.cert"
    - "{{ ziti_router_base_dir }}/{{ ziti_name }}.key"
    - "{{ ziti_router_base_dir }}/{{ ziti_name }}.server.chain.cert"
    - "{{ ziti_router_base_dir }}/{{ ziti_name }}.cas"
  when:
    - not _ziti_router_enrolled.stat.exists
    - _ziti_jwt.stat.exists | default(false)

- name: Remove JWT from router host
  ansible.builtin.file:
    path: "/tmp/{{ ziti_name }}.jwt"
    state: absent
  when:
    - not _ziti_router_enrolled.stat.exists
    - _ziti_jwt.stat.exists | default(false)

- name: Remove JWT from control node
  ansible.builtin.file:
    path: "{{ ziti_jwt_path }}"
    state: absent
  delegate_to: localhost
  become: false
  when:
    - not _ziti_router_enrolled.stat.exists
    - _ziti_jwt.stat.exists | default(false)

- name: Note enrollment pending
  ansible.builtin.debug:
    msg: >
      Router identity not found and JWT not present at {{ ziti_jwt_path }} on control node.
      Run: ansible-playbook -i inventory/prod playbooks/ziti_register.yaml --tags router -e ziti_name={{ ziti_name }}
      configure/start/verify for ziti_router are skipped on this host until enrollment completes.
  when:
    - not _ziti_router_enrolled.stat.exists
    - not _ziti_jwt.stat.exists
