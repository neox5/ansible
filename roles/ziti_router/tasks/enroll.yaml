---
# Enrollment tasks - enroll router with controller (one-time)
# Gated on identity file existence - safe to re-run

- name: Check if router identity already enrolled
  ansible.builtin.stat:
    path: "{{ ziti_router_base_dir }}/{{ ziti_name }}.cert"
  register: _ziti_router_enrolled
  changed_when: false
  check_mode: false

- name: Assert JWT exists on control node when not yet enrolled
  ansible.builtin.stat:
    path: "{{ ziti_jwt_path }}"
  register: _ziti_jwt
  delegate_to: localhost
  become: false
  changed_when: false
  check_mode: false
  when: not _ziti_router_enrolled.stat.exists

- name: Fail if JWT missing and router not yet enrolled
  ansible.builtin.fail:
    msg: >
      Router identity not found and JWT not present at {{ ziti_jwt_path }} on control node.
      Run: ansible-playbook -i inventory/prod playbooks/ziti_register.yaml --tags router -e ziti_name={{ ziti_name }}
  when:
    - not _ziti_router_enrolled.stat.exists
    - not _ziti_jwt.stat.exists

- name: Ensure router base directory exists
  ansible.builtin.file:
    path: "{{ ziti_router_base_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  when: not _ziti_router_enrolled.stat.exists

- name: Copy JWT to router host
  ansible.builtin.copy:
    src: "{{ ziti_jwt_path }}"
    dest: "/tmp/{{ ziti_name }}.jwt"
    owner: root
    group: root
    mode: "0600"
  when: not _ziti_router_enrolled.stat.exists

- name: Enroll router with controller
  ansible.builtin.command:
    cmd: >
      ziti router enroll {{ ziti_router_config_file }}
      --jwt /tmp/{{ ziti_name }}.jwt
  when: not _ziti_router_enrolled.stat.exists

- name: Remove JWT from router host
  ansible.builtin.file:
    path: "/tmp/{{ ziti_name }}.jwt"
    state: absent
  when: not _ziti_router_enrolled.stat.exists
