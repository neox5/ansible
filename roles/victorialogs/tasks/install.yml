---
# Installation tasks - user, data dir, binary

- name: Create VictoriaLogs system group
  ansible.builtin.group:
    name: "{{ victorialogs_system_group }}"
    state: present
    system: true

- name: Create VictoriaLogs system user
  ansible.builtin.user:
    name: "{{ victorialogs_system_user }}"
    group: "{{ victorialogs_system_group }}"
    shell: /usr/sbin/nologin
    system: true
    createhome: false

- name: Ensure VictoriaLogs data directory exists
  ansible.builtin.file:
    path: "{{ victorialogs_data_dir }}"
    state: directory
    owner: "{{ victorialogs_system_user }}"
    group: "{{ victorialogs_system_group }}"
    mode: "0755"

- name: Download and extract VictoriaLogs binary
  ansible.builtin.unarchive:
    src: "{{ victorialogs_download_url }}"
    dest: /tmp
    remote_src: true
    extra_opts:
      - --no-same-owner
  when: >
    not victorialogs_binary.stat.exists or
    victorialogs_version not in (victorialogs_current_version.stdout | default(''))
  notify: restart victorialogs

- name: Install VictoriaLogs binary
  ansible.builtin.copy:
    src: /tmp/victoria-logs-prod
    dest: /usr/local/bin/victoria-logs-prod
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  when: >
    not victorialogs_binary.stat.exists or
    victorialogs_version not in (victorialogs_current_version.stdout | default(''))
