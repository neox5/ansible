---
# Removal tasks - teardown headscale installation

- name: Stop headscale service
  ansible.builtin.systemd:
    name: headscale
    state: stopped
  failed_when: false

- name: Disable headscale service
  ansible.builtin.systemd:
    name: headscale
    enabled: false
  failed_when: false

- name: Remove headscale package
  ansible.builtin.apt:
    name: headscale
    state: absent
    purge: true

- name: Remove headscale config directory
  ansible.builtin.file:
    path: "{{ headscale_config_dir }}"
    state: absent

- name: Remove headscale run directory
  ansible.builtin.file:
    path: "{{ headscale_run_dir }}"
    state: absent

- name: Remove headscale data directory
  ansible.builtin.file:
    path: "{{ headscale_data_dir }}"
    state: absent
  when: headscale_remove_data | bool

- name: Remove headscale system user
  ansible.builtin.user:
    name: headscale
    state: absent

- name: Remove headscale system group
  ansible.builtin.group:
    name: headscale
    state: absent
