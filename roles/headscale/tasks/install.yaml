---
# Installation tasks - download and install headscale .deb package
# The .deb ships with: headscale binary, default config, systemd unit, dedicated system user

- name: Ensure run directory exists
  ansible.builtin.file:
    path: "{{ headscale_run_dir }}"
    state: directory
    owner: headscale
    group: headscale
    mode: "0750"

- name: Check current headscale version
  ansible.builtin.command:
    cmd: headscale version
  register: headscale_current_version
  changed_when: false
  failed_when: false
  check_mode: false

- name: Download and install headscale .deb package
  ansible.builtin.apt:
    deb: "{{ headscale_download_url }}"
    state: present
  when: >
    headscale_current_version.rc != 0 or
    headscale_version not in (headscale_current_version.stdout | default(''))
  notify: restart headscale
