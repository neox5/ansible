---
# Verification tasks - confirm headscale is operational

- name: Wait for headscale service to be active
  ansible.builtin.systemd:
    name: headscale
  register: headscale_service
  retries: 10
  delay: 2
  until: headscale_service.status.ActiveState == 'active'

- name: Confirm headscale binary responds
  ansible.builtin.command:
    cmd: headscale version
  register: headscale_version_check
  changed_when: false
  failed_when: headscale_version_check.rc != 0

- name: Display deployment summary
  ansible.builtin.debug:
    msg:
      - "headscale {{ headscale_version }} deployment complete"
      - "Server URL: {{ headscale_server_url }}"
      - "Listen: {{ headscale_listen_addr }}"
      - "Metrics: {{ headscale_metrics_addr }}"
      - "Data: {{ headscale_data_dir }}"
      - "DB: {{ headscale_db_path }}"
      - "Embedded DERP: {{ headscale_derp_embedded }}"
      - "Status: active"
