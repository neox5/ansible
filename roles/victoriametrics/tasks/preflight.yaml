---
# Preflight checks - validate environment before proceeding

- name: Gather distribution and service manager facts
  ansible.builtin.setup:
    gather_subset:
      - distribution
      - service_mgr

- name: Assert Debian 13 or later
  ansible.builtin.assert:
    quiet: true
    that:
      - ansible_distribution == "Debian"
      - ansible_distribution_major_version | int >= 13
    fail_msg: "This role requires Debian 13 or later"

- name: Assert systemd is the init system
  ansible.builtin.assert:
    quiet: true
    that: ansible_facts['service_mgr'] == 'systemd'
    fail_msg: "This role requires systemd"

- name: Assert valid state value
  ansible.builtin.assert:
    quiet: true
    that: victoriametrics_state in ['present', 'absent']
    fail_msg: "victoriametrics_state must be 'present' or 'absent'"

- name: Assert remove_data only set when state is absent
  ansible.builtin.assert:
    quiet: true
    that: not victoriametrics_remove_data or victoriametrics_state == 'absent'
    fail_msg: "victoriametrics_remove_data: true requires victoriametrics_state: absent"

- name: Check if VictoriaMetrics binary is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/victoriametrics
  register: victoriametrics_binary
  changed_when: false
  check_mode: false

- name: Check current VictoriaMetrics version
  ansible.builtin.command:
    cmd: /usr/local/bin/victoriametrics --version
  register: victoriametrics_current_version
  changed_when: false
  failed_when: false
  check_mode: false
  when: victoriametrics_binary.stat.exists

- name: Display role information
  ansible.builtin.debug:
    msg: "VictoriaMetrics role - state={{ victoriametrics_state }} version={{ victoriametrics_version }}"
