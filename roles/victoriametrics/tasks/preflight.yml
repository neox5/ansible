---
# Preflight checks - validate environment before proceeding

- name: Gather distribution and service manager facts
  ansible.builtin.setup:
    gather_subset:
      - distribution
      - service_mgr

- name: Assert Debian 13 or later
  ansible.builtin.assert:
    quiet: true
    that:
      - ansible_distribution == "Debian"
      - ansible_distribution_major_version | int >= 13
    fail_msg: "This role requires Debian 13 or later"

- name: Assert systemd is the init system
  ansible.builtin.assert:
    quiet: true
    that: ansible_facts['service_mgr'] == 'systemd'
    fail_msg: "This role requires systemd"

- name: Check if VictoriaMetrics binary is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/victoria-metrics-prod
  register: victoriametrics_binary
  changed_when: false
  check_mode: false

- name: Check current VictoriaMetrics version
  ansible.builtin.command:
    cmd: /usr/local/bin/victoria-metrics-prod --version
  register: victoriametrics_current_version
  changed_when: false
  failed_when: false
  check_mode: false
  when: victoriametrics_binary.stat.exists

- name: Display role information
  ansible.builtin.debug:
    msg: "VictoriaMetrics role - version {{ victoriametrics_version }}"
