---
# Configuration tasks - systemd service unit

- name: Deploy VictoriaMetrics systemd service unit
  ansible.builtin.template:
    src: victoriametrics.service.j2
    dest: /etc/systemd/system/victoriametrics.service
    owner: root
    group: root
    mode: "0644"
  register: victoriametrics_service_unit
  notify: restart victoriametrics

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  when: victoriametrics_service_unit is changed

- name: Enable VictoriaMetrics service
  ansible.builtin.systemd:
    name: victoriametrics
    enabled: true
