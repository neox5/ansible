---
# Reconcile Role Attributes for a single declared Identity
# (included once per item in ziti_identity_role_attributes)

- name: Set role attributes on identity {{ item.identity }}
  ansible.builtin.command:
    cmd: >
      ziti edge update identity {{ item.identity }}
      --role-attributes {{ item.role_attributes | join(',') }}
      {% if item.tags is defined %}--tags {% for k in item.tags %}{{ k }}={{ item.tags[k] }}{% if not loop.last %},{% endif %}{% endfor %}{% endif %}
  changed_when: true
