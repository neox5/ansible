---
# Restic Custom Role - Configuration Defaults

# Installation
restic_version: "0.18.0"
restic_download_path: "/opt"
restic_install_path: "/usr/local/bin"

# Directories
restic_script_dir: "/opt/restic"
restic_log_dir: "/var/log/restic"

# User
restic_user: "root"

# Sources (required - must be set by inventory)
restic_sources: {}

# Repositories (required - must be set by inventory)
restic_repos: {}

# Jobs (required - must be set by inventory)
restic_jobs: {}

# Restore defaults
restic_restore_target: "/tmp/restic-restore"

# Default retention (used when repository does not define retention)
restic_retention:
  keep_daily: 7
  keep_weekly: 4
  keep_monthly: 3
  prune: true
