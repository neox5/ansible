---
# Job configuration - scripts and systemd units

- name: Build source-repo combinations for restore scripts
  ansible.builtin.set_fact:
    restic_restore_combinations: >-
      {{ restic_restore_combinations | default([]) | union(
        item.value.sources | product([item.value.repo]) | map('list') | list
      ) }}
  loop: "{{ restic_jobs | dict2items | selectattr('value.type', 'equalto', 'backup') | list }}"
  loop_control:
    label: "{{ item.key }}"

- name: Add copy destination restore combinations
  ansible.builtin.set_fact:
    restic_restore_combinations: >-
      {{ restic_restore_combinations | default([]) | union(
        item.value.sources | product([item.value.to]) | map('list') | list
      ) }}
  loop: "{{ restic_jobs | dict2items | selectattr('value.type', 'equalto', 'copy') | list }}"
  loop_control:
    label: "{{ item.key }}"

- name: Create job log directories
  ansible.builtin.file:
    path: "{{ restic_log_dir }}/{{ item.key }}"
    state: directory
    owner: "{{ restic_user }}"
    group: "{{ restic_user }}"
    mode: "0755"
  loop: "{{ restic_jobs | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Deploy backup scripts
  ansible.builtin.template:
    src: scripts/backup.sh.j2
    dest: "{{ restic_script_dir }}/backup-{{ item.key }}.sh"
    owner: root
    group: root
    mode: "0755"
  loop: "{{ restic_jobs | dict2items | selectattr('value.type', 'equalto', 'backup') | list }}"
  loop_control:
    label: "{{ item.key }}"

- name: Deploy copy scripts
  ansible.builtin.template:
    src: scripts/copy.sh.j2
    dest: "{{ restic_script_dir }}/copy-{{ item.key }}.sh"
    owner: root
    group: root
    mode: "0755"
  loop: "{{ restic_jobs | dict2items | selectattr('value.type', 'equalto', 'copy') | list }}"
  loop_control:
    label: "{{ item.key }}"

- name: Deploy restore scripts
  ansible.builtin.template:
    src: scripts/restore.sh.j2
    dest: "{{ restic_script_dir }}/restore-{{ item.0 }}-{{ item.1 }}.sh"
    owner: root
    group: root
    mode: "0755"
  loop: "{{ restic_restore_combinations | default([]) | unique }}"
  loop_control:
    label: "{{ item.0 }}-{{ item.1 }}"
  vars:
    source_name: "{{ item.0 }}"
    source: "{{ restic_sources[item.0] }}"
    repo_name: "{{ item.1 }}"
    repo: "{{ restic_repos[item.1] }}"

- name: Deploy job systemd service units
  ansible.builtin.template:
    src: systemd/job.service.j2
    dest: "/etc/systemd/system/restic-{{ item.key }}.service"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ restic_jobs | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  notify: reload systemd

- name: Deploy job systemd timer units
  ansible.builtin.template:
    src: systemd/job.timer.j2
    dest: "/etc/systemd/system/restic-{{ item.key }}.timer"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ restic_jobs | dict2items | selectattr('value.schedule', 'defined') | list }}"
  loop_control:
    label: "{{ item.key }}"
  notify: reload systemd

- name: Flush handlers to reload systemd
  ansible.builtin.meta: flush_handlers

- name: Enable and start job timers
  ansible.builtin.systemd:
    name: "restic-{{ item.key }}.timer"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ restic_jobs | dict2items | selectattr('value.schedule', 'defined') | list }}"
  loop_control:
    label: "{{ item.key }}"
