---
# Repository initialization

- name: Identify primary repository
  ansible.builtin.set_fact:
    restic_primary_repo: "{{ restic_repos | dict2items | selectattr('value.primary', 'defined') | selectattr('value.primary', 'equalto', true) | first }}"

- name: Deploy rclone configuration
  ansible.builtin.template:
    src: rclone.conf.j2
    dest: "{{ rclone_config_path }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Deploy lib.sh credential library
  ansible.builtin.template:
    src: scripts/lib.sh.j2
    dest: "{{ restic_script_dir }}/lib.sh"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Check if primary repository exists
  ansible.builtin.command:
    cmd: >
      bash -c 'source {{ restic_script_dir }}/lib.sh &&
      env $(restic_env {{ restic_primary_repo.key }})
      {{ restic_install_path }}/restic snapshots --json'
  register: restic_primary_check
  changed_when: false
  failed_when: false
  no_log: true

- name: Initialize primary repository
  ansible.builtin.command:
    cmd: >
      bash -c 'source {{ restic_script_dir }}/lib.sh &&
      env $(restic_env {{ restic_primary_repo.key }})
      {{ restic_install_path }}/restic init'
  when:
    - restic_primary_repo.value.init | default(true)
    - restic_primary_check.rc != 0
  no_log: true

- name: Check if non-primary repositories exist
  ansible.builtin.command:
    cmd: >
      bash -c 'source {{ restic_script_dir }}/lib.sh &&
      env $(restic_env {{ item.key }})
      {{ restic_install_path }}/restic snapshots --json'
  register: restic_repo_checks
  changed_when: false
  failed_when: false
  loop: "{{ restic_repos | dict2items | rejectattr('value.primary', 'equalto', true) | list }}"
  loop_control:
    label: "{{ item.key }}"
  no_log: true

- name: Initialize non-primary repositories with copy-chunker-params
  ansible.builtin.command:
    cmd: >
      bash -c 'source {{ restic_script_dir }}/lib.sh &&
      env $(restic_env {{ item.item.key }})
      $(restic_from_env {{ restic_primary_repo.key }})
      {{ restic_install_path }}/restic init
      --from-repo "$(restic_from_env {{ restic_primary_repo.key }} | grep RESTIC_FROM_REPOSITORY | cut -d= -f2-)"
      --copy-chunker-params'
  when:
    - item.item.value.init | default(true)
    - item.rc != 0
  loop: "{{ restic_repo_checks.results }}"
  loop_control:
    label: "{{ item.item.key }}"
  no_log: true

- name: Verify all repositories are accessible
  ansible.builtin.command:
    cmd: >
      bash -c 'source {{ restic_script_dir }}/lib.sh &&
      env $(restic_env {{ item.key }})
      {{ restic_install_path }}/restic snapshots --json'
  changed_when: false
  loop: "{{ restic_repos | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  no_log: true
