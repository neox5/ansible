---
# Copy configuration tasks — off-site replication via restic copy

- name: Build copy jobs list
  ansible.builtin.set_fact:
    restic_copy_jobs: >-
      {{ restic_copy_jobs | default([]) + [
        {
          'backup_name': item.0.key,
          'backup': item.0.value,
          'copy': item.1,
          'backend': restic_backends[item.1.backend],
          'backend_name': item.1.backend,
          'stdin': item.0.value.stdin | default(false),
          'stdin_filename': item.0.value.stdin_filename | default(''),
          'paths': item.0.value.paths | default([])
        }
      ] }}
  loop: "{{ restic_backups | dict2items | subelements('value.copies', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.key }}-{{ item.1.backend }}"

- name: Create copy log directories
  ansible.builtin.file:
    path: "{{ restic_log_dir }}/{{ job.backup_name }}"
    state: directory
    owner: "{{ restic_user }}"
    group: "{{ restic_user }}"
    mode: "0755"
  loop: "{{ restic_copy_jobs | default([]) }}"
  loop_control:
    label: "{{ job.backup_name }}-{{ job.backend_name }}"
    loop_var: job

- name: Deploy copy environment files
  ansible.builtin.template:
    src: copy_environment.sh.j2
    dest: "{{ restic_script_dir }}/copy-env-{{ job.backup_name }}-{{ job.backend_name }}.sh"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ restic_copy_jobs | default([]) }}"
  loop_control:
    label: "{{ job.backup_name }}-{{ job.backend_name }}"
    loop_var: job
  no_log: true

- name: Check if copy repositories exist
  ansible.builtin.command:
    cmd: >
      bash -c 'source {{ restic_script_dir }}/copy-env-{{ job.backup_name }}-{{ job.backend_name }}.sh &&
      {{ restic_install_path }}/restic snapshots --json'
  register: restic_copy_repo_checks
  changed_when: false
  failed_when: false
  loop: "{{ restic_copy_jobs | default([]) }}"
  loop_control:
    label: "{{ job.backup_name }}-{{ job.backend_name }}"
    loop_var: job
  no_log: true

- name: Initialize copy repositories
  ansible.builtin.command:
    cmd: >
      bash -c 'source {{ restic_script_dir }}/copy-env-{{ item.job.backup_name }}-{{ item.job.backend_name }}.sh &&
      {{ restic_install_path }}/restic init'
  when: item.rc != 0
  loop: "{{ restic_copy_repo_checks.results }}"
  loop_control:
    label: "{{ item.job.backup_name }}-{{ item.job.backend_name }}"
  no_log: true

- name: Deploy copy scripts
  ansible.builtin.template:
    src: copy_script.sh.j2
    dest: "{{ restic_script_dir }}/copy-{{ job.backup_name }}-{{ job.backend_name }}.sh"
    owner: root
    group: root
    mode: "0755"
  loop: "{{ restic_copy_jobs | default([]) }}"
  loop_control:
    label: "{{ job.backup_name }}-{{ job.backend_name }}"
    loop_var: job

- name: Deploy copy check scripts
  ansible.builtin.template:
    src: copy_check_script.sh.j2
    dest: "{{ restic_script_dir }}/check-copy-{{ job.backup_name }}-{{ job.backend_name }}.sh"
    owner: root
    group: root
    mode: "0755"
  loop: "{{ restic_copy_jobs | default([]) }}"
  loop_control:
    label: "{{ job.backup_name }}-{{ job.backend_name }}"
    loop_var: job

- name: Deploy copy restore scripts
  ansible.builtin.template:
    src: copy_restore_script.sh.j2
    dest: "{{ restic_script_dir }}/restore-copy-{{ job.backup_name }}-{{ job.backend_name }}.sh"
    owner: root
    group: root
    mode: "0755"
  loop: "{{ restic_copy_jobs | default([]) }}"
  loop_control:
    label: "{{ job.backup_name }}-{{ job.backend_name }}"
    loop_var: job

- name: Deploy copy systemd service units
  ansible.builtin.template:
    src: copy.service.j2
    dest: "/etc/systemd/system/restic-copy-{{ job.backup_name }}-{{ job.backend_name }}.service"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ restic_copy_jobs | default([]) }}"
  loop_control:
    label: "{{ job.backup_name }}-{{ job.backend_name }}"
    loop_var: job
  notify: reload systemd

- name: Deploy copy systemd timer units
  ansible.builtin.template:
    src: copy.timer.j2
    dest: "/etc/systemd/system/restic-copy-{{ job.backup_name }}-{{ job.backend_name }}.timer"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ restic_copy_jobs | default([]) }}"
  loop_control:
    label: "{{ job.backup_name }}-{{ job.backend_name }}"
    loop_var: job
  when: job.copy.schedule is defined
  notify: reload systemd

- name: Flush handlers to reload systemd
  ansible.builtin.meta: flush_handlers

- name: Enable and start copy timers
  ansible.builtin.systemd:
    name: "restic-copy-{{ job.backup_name }}-{{ job.backend_name }}.timer"
    enabled: "{{ job.copy.schedule_enabled | default(restic_copy_schedule_enabled) }}"
    state: started
    daemon_reload: true
  loop: "{{ restic_copy_jobs | default([]) }}"
  loop_control:
    label: "{{ job.backup_name }}-{{ job.backend_name }}"
    loop_var: job
  when: job.copy.schedule is defined
