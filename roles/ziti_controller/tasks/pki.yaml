---
# PKI tasks - generate ECC PKI for the overlay network
# All ziti pki create calls use --curve {{ ziti_curve }} (default P-256)
# Gated on file existence - safe to re-run

- name: Ensure PKI root directory exists
  ansible.builtin.file:
    path: "{{ ziti_controller_pki_dir }}"
    state: directory
    owner: root
    group: "{{ ziti_controller_system_group }}"
    mode: "0750"

# ---------------------------------------------------------------------------
# Root CA (interim: stays on this host — production custody model pending
# dedicated design discussion)
# ---------------------------------------------------------------------------

- name: Check if root CA certificate exists
  ansible.builtin.stat:
    path: "{{ ziti_controller_pki_dir }}/root/certs/root.cert"
  register: _ziti_root_cert
  changed_when: false
  check_mode: false

- name: Generate root CA
  ansible.builtin.command:
    cmd: >
      ziti pki create ca
      --pki-root {{ ziti_controller_pki_dir }}
      --ca-file root
      --ca-name "{{ ziti_trust_domain }} Root CA"
      --trust-domain {{ ziti_trust_domain }}
      --curve {{ ziti_curve }}
      --max-path-len 1
  when: not _ziti_root_cert.stat.exists

- name: Enforce root CA private key permissions
  ansible.builtin.file:
    path: "{{ ziti_controller_pki_dir }}/root/keys/root.key"
    owner: root
    group: root
    mode: "0600"

# ---------------------------------------------------------------------------
# Signing CA / edge enrollment signer (intermediate, stays on host)
# ---------------------------------------------------------------------------

- name: Check if signing CA certificate exists
  ansible.builtin.stat:
    path: "{{ ziti_controller_pki_dir }}/signing/certs/signing.cert"
  register: _ziti_signing_cert
  changed_when: false
  check_mode: false

- name: Generate signing CA (intermediate)
  ansible.builtin.command:
    cmd: >
      ziti pki create intermediate
      --pki-root {{ ziti_controller_pki_dir }}
      --ca-name root
      --intermediate-file signing
      --intermediate-name "{{ ziti_trust_domain }} Signing CA"
      --curve {{ ziti_curve }}
      --max-path-len 0
  when: not _ziti_signing_cert.stat.exists or ziti_renew_signing_ca | bool

# ---------------------------------------------------------------------------
# Controller leaf certs (server + client)
# Name/CN must equal ziti_controller_id — the controller CLIENT cert's CN must
# exactly match the SPIFFE ID's controller-id segment, or `edge init` panics.
# Server cert kept consistent with the same bare id for the same reason.
# ---------------------------------------------------------------------------

- name: Check if controller server cert exists
  ansible.builtin.stat:
    path: "{{ ziti_controller_pki_dir }}/signing/certs/controller-server.chain.pem"
  register: _ziti_server_cert
  changed_when: false
  check_mode: false

- name: Generate controller server cert
  ansible.builtin.command:
    cmd: >
      ziti pki create server
      --pki-root {{ ziti_controller_pki_dir }}
      --ca-name signing
      --server-file controller-server
      --server-name "{{ ziti_controller_id }}"
      --dns "localhost,{{ ziti_ctrl_advertised_address }}"
      --ip "127.0.0.1,::1"
      --spiffe-id "controller/{{ ziti_controller_id }}"
      --curve {{ ziti_curve }}
  when: not _ziti_server_cert.stat.exists

- name: Check if controller client cert exists
  ansible.builtin.stat:
    path: "{{ ziti_controller_pki_dir }}/signing/certs/controller-client.chain.pem"
  register: _ziti_client_cert
  changed_when: false
  check_mode: false

- name: Generate controller client cert
  ansible.builtin.command:
    cmd: >
      ziti pki create client
      --pki-root {{ ziti_controller_pki_dir }}
      --ca-name signing
      --client-file controller-client
      --client-name "{{ ziti_controller_id }}"
      --spiffe-id "controller/{{ ziti_controller_id }}"
      --curve {{ ziti_curve }}
  when: not _ziti_client_cert.stat.exists

# ---------------------------------------------------------------------------
# Signing CA directory ownership
# Signing CA cert/key and controller server/client certs are read by the
# running controller service (ziti-controller:ziti-controller), unlike the
# root CA which is only touched by `ziti pki create` (run as root) above.
# ---------------------------------------------------------------------------

- name: Set ownership of signing CA directory for controller service
  ansible.builtin.file:
    path: "{{ ziti_controller_pki_dir }}/signing"
    state: directory
    owner: "{{ ziti_controller_system_user }}"
    group: "{{ ziti_controller_system_group }}"
    recurse: true

# ---------------------------------------------------------------------------
# Root CA key custody notice
# ---------------------------------------------------------------------------

- name: Notify operator of root CA key custody status
  ansible.builtin.debug:
    msg:
      - "NOTE: Root CA private key remains on this host (interim decision):"
      - "  {{ ziti_controller_pki_dir }}/root/keys/root.key"
      - ""
      - "Production-grade key custody (offline storage / HSM) is deferred pending"
      - "a dedicated design discussion. Do not treat this as final."
