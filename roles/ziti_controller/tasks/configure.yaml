---
# Configuration tasks - render config.yml from template

- name: Ensure database directory exists
  ansible.builtin.file:
    path: "{{ ziti_controller_db_dir }}"
    state: directory
    owner: "{{ ziti_controller_system_user }}"
    group: "{{ ziti_controller_system_group }}"
    mode: "0700"

- name: Deploy controller config.yml
  ansible.builtin.template:
    src: config.yml.j2
    dest: "{{ ziti_controller_config_file }}"
    owner: "{{ ziti_controller_system_user }}"
    group: "{{ ziti_controller_system_group }}"
    mode: "0600"
  notify: restart ziti-controller
