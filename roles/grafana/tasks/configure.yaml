---
# Configuration tasks - render datasource provisioning files

- name: Render datasource provisioning files
  ansible.builtin.template:
    src: datasource.yaml.j2
    dest: "{{ grafana_datasources_dir }}/{{ item.uid }}.yaml"
    owner: "{{ grafana_system_user }}"
    group: "{{ grafana_system_group }}"
    mode: "0640"
  loop: "{{ grafana_datasources }}"
  loop_control:
    label: "{{ item.uid }}"
  notify: restart grafana

- name: Find existing datasource files
  ansible.builtin.find:
    paths: "{{ grafana_datasources_dir }}"
    patterns: "*.yaml"
  register: _existing_datasource_files

- name: Remove orphaned datasource files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ _existing_datasource_files.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: >
    item.path | basename | replace('.yaml', '')
    not in (grafana_datasources | map(attribute='uid') | list)
  notify: restart grafana

- name: Check if Grafana service is running
  ansible.builtin.systemd:
    name: grafana
  register: _grafana_service_state

- name: Flush handlers if Grafana service is running
  ansible.builtin.meta: flush_handlers
  when: _grafana_service_state.status.ActiveState == "active"
