---
# Installation tasks - directories, system user, plugin downloads

- name: Create grafana system group
  ansible.builtin.group:
    name: "{{ grafana_system_group }}"
    gid: "{{ grafana_gid }}"
    state: present
    system: true

- name: Create grafana system user
  ansible.builtin.user:
    name: "{{ grafana_system_user }}"
    uid: "{{ grafana_uid }}"
    group: "{{ grafana_system_group }}"
    shell: /usr/sbin/nologin
    system: true
    createhome: false

- name: Create grafana directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ grafana_system_user }}"
    group: "{{ grafana_system_group }}"
    mode: "0755"
  loop:
    - "{{ grafana_base_dir }}"
    - "{{ grafana_data_dir }}"
    - "{{ grafana_plugins_dir }}"
    - "{{ grafana_dashboards_dir }}"
    - "{{ grafana_provisioning_dir }}"
    - "{{ grafana_datasources_dir }}"

- name: Derive required plugins from configured datasource types
  ansible.builtin.set_fact:
    _grafana_required_plugins: >-
      {{ grafana_datasources | map(attribute='type') | select('in', grafana_plugin_map) | list | unique }}

- name: Install required Grafana plugins
  ansible.builtin.include_tasks: install_plugin.yaml
  loop: "{{ _grafana_required_plugins }}"
  loop_control:
    loop_var: grafana_plugin_id

- name: Find installed plugin directories
  ansible.builtin.find:
    paths: "{{ grafana_plugins_dir }}"
    file_type: directory
    depth: 1
  register: _installed_plugin_dirs

- name: Remove orphaned plugin directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ _installed_plugin_dirs.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: item.path | basename not in _grafana_required_plugins
