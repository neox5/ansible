---
# Preflight checks - validate environment before proceeding

- name: Gather distribution facts
  ansible.builtin.setup:
    gather_subset:
      - distribution

- name: Assert Debian 13 or later
  ansible.builtin.assert:
    quiet: true
    that:
      - ansible_distribution == "Debian"
      - ansible_distribution_major_version | int >= 13
    fail_msg: "This role requires Debian 13 or later"

- name: Assert caddy_email is configured
  ansible.builtin.assert:
    quiet: true
    that:
      - caddy_email | length > 0
    fail_msg: "caddy_email must be configured for Let's Encrypt"

- name: Assert caddy_sites is not empty
  ansible.builtin.assert:
    quiet: true
    that:
      - caddy_sites | length > 0
    fail_msg: "caddy_sites must contain at least one site configuration"

- name: Assert caddy_acme_ca_root is set when using private ACME CA
  ansible.builtin.assert:
    quiet: true
    that:
      - caddy_acme_ca_root | length > 0
    fail_msg: "caddy_acme_ca_root must be set when caddy_acme_ca is configured"
  when: caddy_acme_ca | length > 0

- name: Display role information
  ansible.builtin.debug:
    msg: "Caddy role - Debian {{ ansible_distribution_major_version }}"
