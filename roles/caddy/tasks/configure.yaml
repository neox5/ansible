---
# Caddy configuration tasks

- name: Ensure caddy site domains are in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 {{ item.domain }} # caddy: {{ item.domain }}"
    regexp: "^127\\.0\\.0\\.1 {{ item.domain | regex_escape() }} "
    state: present
  loop: "{{ caddy_sites }}"

- name: Add caddy user to ssl-cert group
  ansible.builtin.user:
    name: caddy
    groups: ssl-cert
    append: true

- name: Ensure caddy log directory exists
  ansible.builtin.file:
    path: "{{ caddy_access_log_path | dirname }}"
    state: directory
    owner: caddy
    group: caddy
    mode: "0750"
  when: caddy_access_log_enabled

- name: Deploy Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ caddy_config_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: restart caddy

- name: Validate Caddyfile
  ansible.builtin.command:
    cmd: caddy validate --adapter caddyfile --config {{ caddy_config_file }}
  become_user: caddy
  changed_when: false

- name: Ensure Caddy configuration directory exists
  ansible.builtin.file:
    path: /etc/caddy
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Enable and start Caddy service
  ansible.builtin.systemd:
    name: "{{ caddy_service_name }}"
    enabled: "{{ caddy_service_enabled }}"
    state: "{{ caddy_service_state }}"

- name: Flush handlers to apply configuration
  ansible.builtin.meta: flush_handlers

- name: Verify Caddy is running
  ansible.builtin.systemd:
    name: "{{ caddy_service_name }}"
    state: started

- name: Display deployment summary
  ansible.builtin.debug:
    msg:
      - "Caddy {{ caddy_version }}.x deployment complete"
      - "Sites configured: {{ caddy_sites | map(attribute='domain') | list | join(', ') }}"
      - "ACME CA: {{ caddy_acme_ca if caddy_acme_ca | length > 0 else 'Let\\'s Encrypt (default)' }}"
      - "Contact email: {{ caddy_email }}"
      - "Access logging: {{ 'enabled → ' + caddy_access_log_path if caddy_access_log_enabled else 'disabled' }}"
