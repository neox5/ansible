---
# Caddy Custom Role - Configuration Defaults

# Caddy version (major version pin)
caddy_version: 2

# Let's Encrypt contact email (required)
caddy_email: ""

# Virtual hosts configuration (required)
# Each site is a reverse proxy to a backend service
caddy_sites: []
# Example:
# caddy_sites:
#   - domain: app.example.com
#     backend: localhost:3000
#   - domain: api.example.com
#     backend: localhost:8080

# ACME CA directory URL (leave empty for Let's Encrypt default)
# Example: https://127.0.0.1:9443/acme/acme/directory
caddy_acme_ca: ""

# Path to PEM file for trusting the ACME CA's TLS certificate.
# Required when caddy_acme_ca points to a private CA whose root
# is not in the system trust store at Caddy's Go runtime level.
# Example: /usr/local/share/ca-certificates/zion_root_ca_g1.crt
caddy_acme_ca_root: ""

# Admin API configuration
caddy_admin_enabled: true
caddy_admin_address: "localhost:2019"

# Metrics configuration
caddy_metrics_enabled: true
caddy_metrics_per_host: true

# Service state
caddy_service_state: started
caddy_service_enabled: yes

# Configuration file location
caddy_config_file: /etc/caddy/Caddyfile

# APT repository
caddy_apt_key_url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
caddy_apt_repo_url: https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt

# Access log configuration
# Opt-in flag — access logging is disabled by default
caddy_access_log_enabled: false
caddy_access_log_path: /var/log/caddy/access.log
caddy_access_log_roll_size: 10MiB
caddy_access_log_roll_keep: 5
caddy_access_log_roll_keep_for: 7d
# Paths to exclude from access logs (health probes, etc.)
# Set to [] to disable log_skip entirely
caddy_access_log_skip_paths:
  - /health
  - /healthz
  - /ping
