---
- name: Create journald.conf.d directory
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure journald security drop-in
  ansible.builtin.template:
    src: journald-override.conf.j2
    dest: /etc/systemd/journald.conf.d/{{ security_journald_conf_file }}
    owner: root
    group: root
    mode: "0644"
  notify: Restart journald
