---
# ziti_service Role - Configuration Defaults

# Declared services — the authoritative list. Empty by default; populate
# via inventory group_vars or playbook vars.
#
# ziti_services:
#   - name: n8n-webhook
#     intercept:
#       addresses: ["n8n.ziti"]
#       port: 443
#     host:                          # omit if service is bound by SDK, not a tunneler
#       address: "127.0.0.1"
#       port: 5678
#     dial_roles: "#n8n-clients"     # omit to skip dial policy
#     bind_roles: "@core"            # omit to skip bind policy
ziti_services: []

# Controller endpoint — reuse overlay-wide vars set in inventory
# ziti_ctrl_advertised_address: ""   # mandatory — set in inventory
# ziti_ctrl_advertised_port: 1280    # set in ziti_controller defaults

# Pruning — remove controller-side services/configs/policies not present
# in ziti_services. Disabled by default; destructive, requires explicit opt-in.
ziti_service_prune: false
