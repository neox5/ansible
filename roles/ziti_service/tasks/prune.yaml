---
# Pruning tasks - remove controller-side objects not present in ziti_services
# Gated by ziti_service_prune (opt-in, destructive)

- name: List current services on controller
  ansible.builtin.command:
    cmd: ziti edge list services --output-json
  register: _ziti_current_services
  changed_when: false

- name: List current configs on controller
  ansible.builtin.command:
    cmd: ziti edge list configs --output-json
  register: _ziti_current_configs
  changed_when: false

- name: List current service-policies on controller
  ansible.builtin.command:
    cmd: ziti edge list service-policies --output-json
  register: _ziti_current_policies
  changed_when: false

- name: Determine orphaned services
  ansible.builtin.set_fact:
    _ziti_orphan_services: >-
      {{ (_ziti_current_services.stdout | from_json).data
         | map(attribute='name') | list
         | difference(ziti_services | map(attribute='name') | list) }}
    _ziti_orphan_configs: >-
      {{ (_ziti_current_configs.stdout | from_json).data
         | map(attribute='name') | list
         | difference((ziti_services | map(attribute='name') | map('regex_replace', '^(.*)$', '\1.intercept.v1') | list)
                       + (ziti_services | selectattr('host', 'defined') | map(attribute='name')
                          | map('regex_replace', '^(.*)$', '\1.host.v1') | list)) }}
    _ziti_orphan_policies: >-
      {{ (_ziti_current_policies.stdout | from_json).data
         | map(attribute='name') | list
         | difference((ziti_services | selectattr('dial_roles', 'defined') | map(attribute='name')
                       | map('regex_replace', '^(.*)$', '\1.dial') | list)
                       + (ziti_services | selectattr('bind_roles', 'defined') | map(attribute='name')
                          | map('regex_replace', '^(.*)$', '\1.bind') | list)) }}

- name: Remove orphaned service-policies
  ansible.builtin.command:
    cmd: ziti edge delete service-policy "{{ item }}"
  loop: "{{ _ziti_orphan_policies }}"
  changed_when: true

- name: Remove orphaned services
  ansible.builtin.command:
    cmd: ziti edge delete service "{{ item }}"
  loop: "{{ _ziti_orphan_services }}"
  changed_when: true

- name: Remove orphaned configs
  ansible.builtin.command:
    cmd: ziti edge delete config "{{ item }}"
  loop: "{{ _ziti_orphan_configs }}"
  changed_when: true

- name: Display pruning summary
  ansible.builtin.debug:
    msg:
      - "Pruned policies: {{ _ziti_orphan_policies }}"
      - "Pruned services: {{ _ziti_orphan_services }}"
      - "Pruned configs: {{ _ziti_orphan_configs }}"
