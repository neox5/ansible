---
# ============================================================================
# PostgreSQL: n150-01 Database Objects
# File: host_vars/n150-01/postgresql.yaml
# Role: postgresql (custom)
# ============================================================================
#
# Authoritative definition of all databases, users, and privileges on n150-01.
# Replaces group_vars composition which does not support list merging.

postgresql_databases:
  - name: n8n
    owner: n8n
    encoding: UTF-8
    lc_collate: "en_US.UTF-8"
    lc_ctype: "en_US.UTF-8"
    template: template0
  - name: stepca
    owner: stepca
    encoding: UTF-8
    lc_collate: "en_US.UTF-8"
    lc_ctype: "en_US.UTF-8"
    template: template0
  - name: synapse
    owner: synapse
    encoding: UTF-8
    lc_collate: C
    lc_ctype: C
    template: template0
  - name: zitadel
    owner: zitadel
    encoding: UTF-8
    lc_collate: C
    lc_ctype: C
    template: template0

postgresql_users:
  - name: n8n
    pass: "{{ n8n_db_password_secret }}"
    encrypted: true
  - name: stepca
    pass: "{{ stepca_db_password_secret }}"
    encrypted: true
  - name: synapse
    pass: "{{ synapse_db_password_secret }}"
    encrypted: true
  - name: zitadel
    pass: "{{ zitadel_db_password_secret }}"
    encrypted: true

postgresql_user_privileges:
  - name: n8n
    db: n8n
    priv: "ALL"
  - name: stepca
    db: stepca
    priv: "ALL"
  - name: synapse
    db: synapse
    priv: "ALL"
  - name: zitadel
    db: zitadel
    priv: "ALL"
