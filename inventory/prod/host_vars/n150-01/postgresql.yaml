---
# ============================================================================
# PostgreSQL: n150-01 Database Objects
# File: host_vars/n150-01/postgresql.yaml
# Role: postgresql (custom)
# ============================================================================
#
# Authoritative definition of all databases, users, and privileges on n150-01.
# Replaces group_vars composition which does not support list merging.
# Passwords referenced from host_vars/n150-01/secrets.sops.yaml
# ============================================================================

# --- Database Creation ---
postgresql_databases:
  - name: "{{ n8n_db_name }}"
    owner: "{{ n8n_db_user }}"
    lc_collate: "{{ postgresql_defaults.db.lc_collate }}"
    lc_ctype: "{{ postgresql_defaults.db.lc_ctype }}"
    encoding: "{{ postgresql_defaults.db.encoding }}"
    template: "{{ postgresql_defaults.db.template }}"
    state: present
  - name: stepca
    owner: stepca
    lc_collate: "{{ postgresql_defaults.db.lc_collate }}"
    lc_ctype: "{{ postgresql_defaults.db.lc_ctype }}"
    encoding: "{{ postgresql_defaults.db.encoding }}"
    template: "{{ postgresql_defaults.db.template }}"
    state: present
  - name: "{{ synapse_db_name }}"
    owner: "{{ synapse_db_user }}"
    lc_collate: "C"
    lc_ctype: "C"
    encoding: "UTF8"
    template: template0
    state: present

# --- User Creation ---
postgresql_users:
  - name: "{{ n8n_db_user }}"
    password: "{{ n8n_db_password_secret }}"
    encrypted: yes
    role_attr_flags: "NOCREATEDB,NOSUPERUSER"
    state: present
  - name: stepca
    password: "{{ stepca_db_password_secret }}"
    encrypted: yes
    role_attr_flags: "NOCREATEDB,NOSUPERUSER"
    state: present
  - name: "{{ synapse_db_user }}"
    password: "{{ synapse_db_password_secret }}"
    encrypted: yes
    role_attr_flags: "NOCREATEDB,NOSUPERUSER"
    state: present

# --- User Privileges ---
postgresql_user_privileges:
  - name: "{{ n8n_db_user }}"
    db: "{{ n8n_db_name }}"
    priv: "ALL"
  - name: stepca
    db: stepca
    priv: "ALL"
  - name: "{{ synapse_db_user }}"
    db: "{{ synapse_db_name }}"
    priv: "ALL"
