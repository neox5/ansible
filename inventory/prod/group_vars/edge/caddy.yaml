---
# =============================================================================
# Caddy: edge Group Configuration
# File: group_vars/edge/caddy.yaml
# Role: caddy
# =============================================================================
#
# Edge hosts use Let's Encrypt for public TLS certificates.
# No private CA — caddy_acme_ca left empty (LE default).
#
# Applied to: All hosts in 'edge' group
# Variable precedence: all < edge (this file) < host_vars

# Contact email for Let's Encrypt account
caddy_email: "admin@neox5.com"

# Public CA (Let's Encrypt default — no private CA on edge)
caddy_acme_ca: ""
caddy_acme_ca_root: ""

# Headscale site — domain resolved via headscale_domain in host_vars
caddy_sites:
  - domain: "{{ headscale_domain }}"
    routes:
      - backend: "localhost:8080"
        headers_up:
          - "True-Client-IP {remote_host}"
          - "X-Real-IP {remote_host}"

# Access logging
caddy_access_log_enabled: true
caddy_access_log_path: /var/log/caddy/access.log
caddy_access_log_roll_size: 10MiB
caddy_access_log_roll_keep: 5
caddy_access_log_roll_keep_for: 7d
