---
# =============================================================================
# Security: edge Group Configuration
# File: group_vars/edge/security.yaml
# Role: security_hardening
# =============================================================================
#
# Edge hosts sit at the internet boundary.
# Ports opened here: SSH baseline + HTTP/HTTPS for Caddy + STUN for DERP.
# Additional ports added as services are deployed.
#
# Applied to: All hosts in 'edge' group
# Variable precedence: all < edge (this file) < host_vars

security_firewall_allowed_tcp_ports:
  - 80    # HTTP (Caddy — redirect to HTTPS + ACME challenge)
  - 443   # HTTPS (Caddy — headscale coordination)

security_firewall_allowed_udp_ports:
  - 3478  # STUN (headscale embedded DERP)
