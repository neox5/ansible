---
# ============================================================================
# Caddy: Production Configuration
# File: group_vars/n150/caddy.yml
# Role: caddy (custom)
# ============================================================================
#
# Production configuration for Caddy reverse proxy.
# Proxies external HTTPS traffic to n8n container.
#
# Applied to: All hosts in 'n150' group
# Variable precedence: all < n150 (this file) < host_vars
#
# ============================================================================

# --- Let's Encrypt Contact Email ---
caddy_email: "office@zion.local"

# --- Caddy Sites Configuration ---
caddy_sites:
  - domain: "n8n.zion.local"
    backend: "localhost:{{ n8n_port }}"
    tls:
      cert: /etc/ssl/certs/n8n.crt
      key: /etc/ssl/private/n8n.key
