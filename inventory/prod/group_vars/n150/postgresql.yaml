---
# ============================================================================
# PostgreSQL: n150 Configuration
# File: group_vars/n150/postgresql.yaml
# Role: anxs.postgresql
# ============================================================================
#
# Merges service-level config (formerly group_vars/db/) and hardware tuning
# (formerly group_vars/hw_n150/) into a single topology-scoped file.
#
# Hardware profile: N150 mini cube
# - RAM: 12GB
# - Storage: 512GB SSD
# - CPU: x86_64 (multi-core)
#
# Applied to: All hosts in 'n150' group
# Variable precedence: all < n150 (this file) < host_vars
#
# Tuning based on PostgreSQL wiki guidelines for mixed workload.
# References: https://wiki.postgresql.org/wiki/Tuning_Your_PostgreSQL_Server
# ============================================================================

# --- ROLE: Version ---
postgresql_version: 17

# --- ROLE: Server-wide Encoding and Locale ---
# References postgresql_defaults.server from group_vars/all/
postgresql_encoding: "{{ postgresql_defaults.server.encoding }}"
postgresql_locale: "{{ postgresql_defaults.server.locale }}"
postgresql_ctype: "{{ postgresql_defaults.server.ctype }}"

# --- ROLE: Data Directory ---
# References postgresql_defaults.paths from group_vars/all/
postgresql_data_directory: "{{ postgresql_defaults.paths.data_directory }}"

# --- ROLE: Network Configuration ---
postgresql_listen_addresses: "localhost"
postgresql_port: 5432

# --- ROLE: Authentication ---
postgresql_auth_method: "scram-sha-256"

# --- ROLE: Logging ---
postgresql_logging_collector: on
postgresql_log_directory: "log"
postgresql_log_filename: "postgresql-%a.log"
postgresql_log_rotation_age: "1d"
postgresql_log_rotation_size: 0
postgresql_log_truncate_on_rotation: on

# --- ROLE: Connection Limits ---
postgresql_max_connections: 100

# --- ROLE: Service State ---
postgresql_service_state: "started"
postgresql_service_enabled: yes

# --- ROLE: Memory Settings ---
# Based on 12GB total RAM

# shared_buffers: 25% of RAM for dedicated database server
postgresql_shared_buffers: "3GB"

# effective_cache_size: Estimate of memory for disk caching (50-75% RAM)
postgresql_effective_cache_size: "8GB"

# work_mem: Memory per sort/hash operation
# Formula: (RAM - shared_buffers) / max_connections / 3
# (12GB - 3GB) / 100 / 3 ≈ 30MB
postgresql_work_mem: "30MB"

# maintenance_work_mem: Memory for VACUUM, CREATE INDEX (5% of RAM)
postgresql_maintenance_work_mem: "512MB"

# --- ROLE: WAL Settings (SSD-optimized) ---
postgresql_wal_buffers: "16MB"
postgresql_checkpoint_completion_target: 0.9

# --- ROLE: Query Planner (SSD optimization) ---
# SSD has low random access cost compared to sequential
postgresql_random_page_cost: 1.1
postgresql_effective_io_concurrency: 200
