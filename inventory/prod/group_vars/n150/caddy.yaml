---
# ============================================================================
# Caddy: Prod core Configuration
# File: group_vars/core/caddy.yaml
# Role: caddy (custom)
# ============================================================================
#
# Production environment configuration for Caddy reverse proxy.
# Uses step-ca ACME for automatic certificate issuance.
#
# Applied to: All hosts in 'core' group
# Variable precedence: all < core (this file) < host_vars
#
# ============================================================================

# --- Contact Email ---
caddy_email: "office@zion.local"

# --- Private CA ACME endpoint ---
caddy_acme_ca: "https://127.0.0.1:9443/acme/stepca/directory"

# --- Root CA PEM for trusting step-ca's TLS certificate ---
caddy_acme_ca_root: "/usr/local/share/ca-certificates/zion_root_ca_g1.crt"

# --- Caddy Sites Configuration ---
caddy_sites:
  - domain: "n8n.zion.local"
    hosts_entry: true
    routes:
      - backend: "localhost:5678"
  - domain: "grafana.zion.local"
    hosts_entry: true
    routes:
      - backend: "localhost:3000"
  - domain: "excalidraw.zion.local"
    hosts_entry: true
    routes:
      - backend: "localhost:8080"
  - domain: "excalibar.zion.local"
    hosts_entry: true
    routes:
      - backend: "localhost:8085"
  - domain: "s3.zion.local"
    hosts_entry: true
    routes:
      - backend: "localhost:7070"
  - domain: "s3ui.zion.local"
    hosts_entry: true
    routes:
      - backend: "localhost:7071"
  - domain: "matrix.zion.local"
    hosts_entry: true
    routes:
      - backend: "localhost:8008"
  - domain: "zitadel.zion.local"
    hosts_entry: true
    routes:
      - path: /ui/v2/login/*
        backend: "http://localhost:3000"
      - backend: "h2c://localhost:8080"
        headers_up:
          - "-TE"

# --- Access Logging ---
caddy_access_log_enabled: true
caddy_access_log_path: /var/log/caddy/access.log
caddy_access_log_roll_size: 10MiB
caddy_access_log_roll_keep: 5
caddy_access_log_roll_keep_for: 7d
caddy_access_log_skip_paths:
  - /health
  - /healthz
  - /ping
# ============================================================================
# Notes:
# - Caddy listens on 443 (HTTPS) and redirects 80 → 443
# - Certificates issued automatically via step-ca ACME
# - hosts_entry: true because N150 is its own DNS server for .local domains
# - Ports are hardcoded here to avoid cross-role variable dependencies
# ============================================================================
