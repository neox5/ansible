---
# ============================================================================
# ziti_router: core profile
# File: group_vars/core/ziti_router.yaml
# Role: ziti_router (custom)
# ============================================================================
#
# Private router profile (LAN-resident, on-site clients): no link listener,
# built-in tunneler enabled in host mode.

ziti_router_advertised_port: 3022
ziti_router_link_listener: false

ziti_router_tunneler_enabled: true
ziti_router_tunneler_mode: host
