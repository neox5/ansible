---
# ============================================================================
# Restic: core Backup Sources
# File: group_vars/core/restic.yaml
# Role: restic (custom)
# ============================================================================
#
# Defines what gets backed up on all core hosts.
# Repos and jobs are host-specific (host_vars/<host>/restic.yaml).
#
# Applied to: All hosts in 'core' group
# Variable precedence: all < core (this file) < host_vars
#
# ============================================================================

restic_sources:
  n8n_database:
    stdin: true
    stdin_command: "sudo -u postgres pg_dump -U postgres -Fc {{ n8n_db_name }}"
    stdin_filename: "n8n_database.dump"
    restore_hint: "sudo -u postgres /opt/postgresql/pg_restore.sh {{ n8n_db_name }} --dump <path from above>"
    tags:
      - database

  n8n_data:
    paths:
      - "{{ n8n_data_dir }}"
    restore_hint: "sudo cp -a /tmp/restic-restore{{ n8n_data_dir }}/. {{ n8n_data_dir }}/"
    tags:
      - data
