---
# OTel Collector: lab-vm
# Role: otelcol

# --- Access grants ---
otelcol_journal_access: true
otelcol_acl_paths:
  - /var/log/caddy

# --- Pipeline configuration ---
otelcol_config:
  extensions:
    health_check:
      endpoint: "127.0.0.1:13133"

    file_storage/checkpoint:
      directory: /var/lib/otelcol/storage
      timeout: 10s

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "127.0.0.1:4317"

    hostmetrics:
      collection_interval: 15s
      scrapers:
        cpu:
        memory:
        disk:
        filesystem:
        network:
        load:
        paging:
        processes:

    filelog/caddy_access:
      include:
        - /var/log/caddy/access.log
      start_at: end
      storage: file_storage/checkpoint
      operators:
        - type: json_parser
          timestamp:
            parse_from: attributes.ts
            layout_type: epoch
            layout: s

    journald/system:
      units:
        - caddy.service
        - postgresql.service
        - n8n.service
        - victoriametrics.service
        - victorialogs-access.service
        - victorialogs-app.service
        - victorialogs-system.service
        - victorialogs-security.service
        - otelcol.service
      storage: file_storage/checkpoint

    journald/security:
      units:
        - sshd.service
        - sudo.service
        - fail2ban.service
        - systemd-logind.service
      storage: file_storage/checkpoint

    prometheus/caddy:
      config:
        scrape_configs:
          - job_name: caddy
            scrape_interval: 15s
            static_configs:
              - targets: ["localhost:2019"]
                labels:
                  instance: caddy
            metrics_path: /metrics

    prometheus/victorialogs:
      config:
        scrape_configs:
          - job_name: victorialogs
            scrape_interval: 15s
            static_configs:
              - targets: ["localhost:9428"]
                labels:
                  instance: victorialogs-access
              - targets: ["localhost:9429"]
                labels:
                  instance: victorialogs-app
              - targets: ["localhost:9430"]
                labels:
                  instance: victorialogs-system
              - targets: ["localhost:9431"]
                labels:
                  instance: victorialogs-security

    prometheus/stepca:
      config:
        scrape_configs:
          - job_name: stepca
            scrape_interval: 15s
            static_configs:
              - targets: ["localhost:9444"]
                labels:
                  instance: stepca
            metrics_path: /metrics

    prometheus/grafana:
      config:
        scrape_configs:
          - job_name: grafana
            scrape_interval: 15s
            static_configs:
              - targets: ["localhost:3000"]
                labels:
                  instance: grafana
            metrics_path: /metrics

  processors:
    batch:
      timeout: 15s
      send_batch_size: 1000

  exporters:
    otlphttp/victoriametrics:
      endpoint: "http://127.0.0.1:8428/opentelemetry"
      tls:
        insecure: true
      sending_queue:
        enabled: true
        queue_size: 1000
      timeout: 30s
      retry_on_failure:
        enabled: true
        initial_interval: 1s
        max_interval: 30s
        max_elapsed_time: 5m

    otlphttp/victorialogs_access:
      endpoint: "http://127.0.0.1:9428/insert/opentelemetry"
      tls:
        insecure: true

    otlphttp/victorialogs_system:
      endpoint: "http://127.0.0.1:9430/insert/opentelemetry"
      tls:
        insecure: true

    otlphttp/victorialogs_security:
      endpoint: "http://127.0.0.1:9431/insert/opentelemetry"
      tls:
        insecure: true

  service:
    extensions: [health_check, file_storage/checkpoint]

    pipelines:
      metrics/host:
        receivers: [hostmetrics]
        processors: [batch]
        exporters: [otlphttp/victoriametrics]

      metrics/self:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlphttp/victoriametrics]

      metrics/prometheus:
        receivers:
          [
            prometheus/caddy,
            prometheus/victorialogs,
            prometheus/stepca,
            prometheus/grafana,
          ]
        processors: [batch]
        exporters: [otlphttp/victoriametrics]

      logs/caddy_access:
        receivers: [filelog/caddy_access]
        processors: [batch]
        exporters: [otlphttp/victorialogs_access]

      logs/system:
        receivers: [journald/system]
        processors: [batch]
        exporters: [otlphttp/victorialogs_system]

      logs/security:
        receivers: [journald/security]
        processors: [batch]
        exporters: [otlphttp/victorialogs_security]

    telemetry:
      logs:
        level: info

      metrics:
        level: detailed
        readers:
          - periodic:
              interval: 15000
              exporter:
                otlp:
                  protocol: grpc
                  endpoint: "http://127.0.0.1:4317"

      resource:
        service.name: "otelcol-{{ ansible_hostname }}"
        service.version: "{{ otelcol_version }}"
        deployment.environment: "{{ otelcol_environment }}"
