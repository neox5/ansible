---
# ============================================================================
# Restic: n8n Sources
# File: group_vars/n8n/restic.yml
# Role: restic (custom)
# ============================================================================
#
# Defines what gets backed up for all n8n hosts.
# Repos and jobs are host-specific (host_vars/<host>/restic.yml).
#
# Applied to: All hosts in 'n8n' group
# Variable precedence: Overrides all/, overridden by host_vars/
# ============================================================================

restic_sources:
  n8n_database:
    stdin: true
    stdin_command: "sudo -u postgres pg_dump -U postgres -Fc {{ n8n_db_name }}"
    stdin_filename: "n8n_database.dump"
    tags:
      - database

  n8n_data:
    paths:
      - "{{ n8n_data_dir }}"
    tags:
      - data
