---
# ============================================================================
# Caddy: Lab Configuration
# File: group_vars/n150/caddy.yml
# Role: caddy (custom)
# ============================================================================
#
# Lab environment configuration for Caddy reverse proxy.
# Uses step-ca ACME for automatic certificate issuance.
#
# Applied to: All hosts in 'n150' group
# Variable precedence: all < n150 (this file) < host_vars
#
# ============================================================================

# --- Contact Email ---
caddy_email: "office@zion.local"

# --- Private CA ACME endpoint ---
caddy_acme_ca: "https://127.0.0.1:9443/acme/acme/directory"

# --- Root CA certificate to trust (step-ca TLS + ACME chain validation) ---
caddy_trusted_ca_cert: "/etc/stepca/certs/root_ca.crt"

# --- Caddy Sites Configuration ---
caddy_sites:
  - domain: "n8n.zion.local"
    backend: "localhost:5678"
  - domain: "grafana.zion.local"
    backend: "localhost:3000"
# ============================================================================
# Notes:
# - Caddy listens on 443 (HTTPS) and redirects 80 → 443
# - Certificates issued automatically via step-ca ACME
# - Domains must be in /etc/hosts or local DNS
# - Ports are hardcoded here to avoid cross-role variable dependencies
# ============================================================================
